<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .header {
            background-color: #001f3f;
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 28px;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .add-button {
            display: inline-block;
            background-color: #001f3f;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        th {
            background-color: #001f3f;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .update-link {
            color: #001f3f;
            text-decoration: none;
            padding: 5px 10px;
            background-color: #e0e0e0;
            border-radius: 3px;
            margin-right: 5px;
        }

        .delete-link {
            color: #001f3f;
            text-decoration: none;
            padding: 5px 10px;
            background-color: #e0e0e0;
            border-radius: 3px;
        }


        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Student Management System</h1>
</div>

<div class="container">
    <a th:href="@{/showAddStudentForm}" class="add-button">Add New Student</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Email</th>
            <th>City</th>
            <th>Date of Birth</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${studentList.isEmpty()}">
            <td colspan="8" class="no-data">No students found. Click "Add New Student" to add.</td>
        </tr>
        <tr th:each="student : ${studentList}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.name}"></td>
            <td th:text="${student.age}"></td>
            <td th:text="${student.gender}"></td>
            <td th:text="${student.email}"></td>
            <td th:text="${student.city}"></td>
            <td th:text="${student.dateOfBirth}"></td>
            <td>
                <a th:href="@{/showUpdateForm/{id}(id=${student.id})}" class="update-link">Edit</a>
                <a th:href="@{/deleteStudent/{id}(id=${student.id})}"
                   class="delete-link"
                   onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
