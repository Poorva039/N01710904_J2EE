<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Update Stock</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="header">
  Product Inventory Management System
</div>

<div class="container">
  <h2 style="text-align: center;">Update Stock</h2>

  <form th:action="@{/products/stock/{id}(id=${product.id})}" method="post">
    <div class="form-group">
      <label>ID:</label>
      <input type="text" th:value="${product.id}" readonly>
    </div>

    <div class="form-group">
      <label>Name:</label>
      <input type="text" th:value="${product.name}" readonly>
    </div>

    <div class="form-group">
      <label>Stock:</label>
      <input type="number" name="stock" th:value="${product.stock}" required>
    </div>

    <div style="text-align: center;">
      <input type="submit" value="Update Stock">
    </div>
  </form>

  <br>

  <div style="text-align: center;">
    <a href="/products">Back</a>
  </div>
</div>

</body>
</html>
