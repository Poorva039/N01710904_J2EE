<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="header">
    Product Inventory Management System
</div>

<div class="container">

    <h2 style="text-align: center;">Edit Product</h2>

    <form th:action="@{/products/update/{id}(id=${product.id})}" method="post">
        <input type="hidden" name="id" th:value="${product.id}">

        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" th:value="${product.name}" required>
        </div>

        <div class="form-group">
            <label for="description">Description:</label>
            <input type="text" id="description" name="description" th:value="${product.description}" required>
        </div>

        <div class="form-group">
            <label for="price">Price:</label>
            <input type="number" id="price" name="price" step="0.01" th:value="${product.price}" required>
        </div>

        <div class="form-group">
            <label for="stock">Stock:</label>
            <input type="number" id="stock" name="stock" th:value="${product.stock}" required>
        </div>

        <br>

        <div style="text-align: center;">
            <input type="submit" value="Update Product">
        </div>
    </form>

    <br>

    <div style="text-align: center;">
        <a href="/products">Back</a>
    </div>

</div>

</body>
</html>
