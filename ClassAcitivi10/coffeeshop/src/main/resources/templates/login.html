<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
</head>
<body>
<div align="center">
  <h2>Enter Login Details</h2>

  <form method="post" th:action="@{/login}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <table>
      <tr>
        <td>Username</td>
        <td><input type="text" name="username" required></td>
      </tr>
      <tr>
        <td>Password</td>
        <td><input type="password" name="password" required></td>
      </tr>
      <tr>
        <td></td>
        <td><input type="submit" value="Login"></td>
      </tr>
    </table>
  </form>

  <br>

  <p th:if="${param.error}" style="color:red;">Invalid Username or Password</p>
  <p th:if="${param.logout}" style="color:green;">You have been logged out successfully</p>
  <p th:if="${success}" th:text="${success}" style="color:green;"></p>

  <br>
  <p><strong>Create new account: <a th:href="@{/register}">Register Here</a></strong></p>
</div>
</body>
</html>
