<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
</head>
<body>
<div align="center">
  <h2>User Registration</h2>

  <p th:if="${error}" th:text="${error}" style="color:red;"></p>

  <form method="post" th:action="@{/signup}" th:object="${user}">
    <table>
      <tr>
        <td>First Name</td>
        <td><input th:field="*{firstName}" type="text" required></td>
      </tr>
      <tr>
        <td>Last Name</td>
        <td><input th:field="*{lastName}" type="text" required></td>
      </tr>
      <tr>
        <td>Email</td>
        <td><input th:field="*{email}" type="email" required></td>
      </tr>
      <tr>
        <td>Username</td>
        <td><input th:field="*{userName}" type="text" required></td>
      </tr>
      <tr>
        <td>Password</td>
        <td><input th:field="*{password}" type="password" required></td>
      </tr>
      <tr>
        <td>Gender</td>
        <td>
          <input th:field="*{gender}" th:value="Male" type="radio"> Male
          <input th:field="*{gender}" th:value="Female" type="radio"> Female
        </td>
      </tr>
      <tr>
        <td>Date of Birth</td>
        <td><input th:field="*{dob}" type="date"></td>
      </tr>
      <tr>
        <td colspan="2" align="center">
          <input type="submit" value="Register">
        </td>
      </tr>
    </table>
  </form>

  <br>
  <a th:href="@{/login}">Back to Login</a>
</div>
</body>
</html>
